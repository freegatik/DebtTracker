name: Zaimka
options:
  bundleIdPrefix: solovev
  deploymentTarget:
    iOS: 17.6
  usesTabs: false
  tabWidth: 4
  indentWidth: 4
  
targets:
  Zaimka:
    type: application
    platform: iOS
    sources:
      - path: Zaimka
    resources:
      - path: Zaimka/PrivacyInfo.xcprivacy
    preBuildScripts:
      - name: Run SwiftFormat
        script: |
          export PATH="$PATH:/usr/local/bin:/opt/homebrew/bin"
          if which swiftformat >/dev/null; then
            VER=$(swiftformat --version | awk '{print $1}')
            if python3 -c "import sys; p=sys.argv[1].split('.'); m=int(p[0]); n=int(p[1]) if len(p)>1 else 0; sys.exit(0 if (m>0 or n>=61) else 1)" "$VER" 2>/dev/null; then
              swiftformat "$SRCROOT" --disable redundantViewBuilder
            else
              swiftformat "$SRCROOT"
            fi
          else
            echo "error: SwiftFormat not installed. Please run: brew install swiftformat"
            exit 1
          fi
        outputFiles: []
        basedOnDependencyAnalysis: false
      - name: Run SwiftLint
        script: |
          export PATH="$PATH:/usr/local/bin:/opt/homebrew/bin"
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "error: SwiftLint not installed. Please run: brew install swiftlint"
            exit 1
          fi
        outputFiles: []
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: solovev.Zaimka
        INFOPLIST_FILE: Zaimka/Presentation/Common/Resources/Info.plist
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
    info:
      path: Zaimka/Presentation/Common/Resources/Info.plist
      properties:
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UILaunchStoryboardName: LaunchScreen
    dependencies:
      - package: SnapKit
    scheme:
      testTargets:
        - ZaimkaTests
        
  ZaimkaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZaimkaTests
    dependencies:
      - target: Zaimka
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Zaimka.app/Zaimka
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: solovev.ZaimkaTests
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        
packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    exactVersion: 5.7.1

